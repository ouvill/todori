version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    groups:
      rust-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: /fuzz
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    groups:
      fuzz-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
