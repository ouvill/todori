name: Infrastructure checks

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/**"
      - ".dockerignore"
      - "server/Dockerfile*"
      - "tool/ci/**"
      - "tool/deploy/**"
      - "tool/prepare_lambda_extension.sh"
      - "realtime-worker/wrangler.jsonc"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/**"
      - ".dockerignore"
      - "server/Dockerfile*"
      - "tool/ci/**"
      - "tool/deploy/**"
      - "tool/prepare_lambda_extension.sh"
      - "realtime-worker/wrangler.jsonc"

permissions:
  contents: read

concurrency:
  group: infra-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: 1.12.1
          tofu_wrapper: false

      - name: Check formatting
        run: tofu fmt -check -recursive infra

      - name: Validate bootstrap
        run: |
          tofu -chdir=infra/bootstrap/state init -backend=false
          tofu -chdir=infra/bootstrap/state validate

      - name: Validate staging
        run: |
          tofu -chdir=infra/environments/staging init -backend=false
          tofu -chdir=infra/environments/staging validate
          tofu -chdir=infra/environments/staging test

      - name: Validate production definition
        run: |
          tofu -chdir=infra/environments/production init -backend=false
          tofu -chdir=infra/environments/production validate
          tofu -chdir=infra/environments/production test

      - name: Check credential and environment boundaries
        run: sh tool/ci/check_infra_boundaries.sh

      - name: Lint GitHub Actions workflows
        run: |
          actionlint_directory="${RUNNER_TEMP}/actionlint"
          ./tool/ci/install_actionlint.sh "$actionlint_directory"
          "$actionlint_directory/actionlint"

      - name: Check shell syntax
        run: bash -n tool/prepare_lambda_extension.sh tool/deploy/*.sh tool/ci/*.sh

      - name: Inject deployment rollback failures
        run: ./tool/ci/test_deploy_rollback.sh
