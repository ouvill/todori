# iOS実機/SimulatorのRustリンクに必要。
# vendored OpenSSL/SQLCipherのCオブジェクトは最新SDKでビルドされるため、
# Rust側リンクのdeployment targetを合わせないと ___chkstk_darwin 未定義でリンクに失敗する。
# target別linker flagに限定し、macOS/Android向けnative dependencyのbuild scriptへ
# IPHONEOS_DEPLOYMENT_TARGETを誤適用しない。
# （2026-07-04検証。最終的な最低サポートiOSバージョンはリリース前に別途決定する）
[target.aarch64-apple-ios]
rustflags = ["-C", "link-arg=-miphoneos-version-min=15.0"]

[target.aarch64-apple-ios-sim]
rustflags = ["-C", "link-arg=-mios-simulator-version-min=15.0"]

[target.x86_64-apple-ios]
rustflags = ["-C", "link-arg=-mios-simulator-version-min=15.0"]
