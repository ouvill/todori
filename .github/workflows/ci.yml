name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Classify CI changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Test change classifier
        run: sh tool/ci/test_classify_changes.sh

      - name: Classify changed paths
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          docs_only=$(sh tool/ci/classify_changes.sh "$EVENT_NAME" "$BEFORE_SHA" "$BASE_SHA" "$HEAD_SHA")
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "docs_only=$docs_only"

  docs-quality:
    name: Documentation structure
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify ADR index and per-file records
        run: sh tool/check_adr_structure.sh

  worker-quality:
    name: Realtime Worker quality gates
    needs: changes
    if: ${{ always() && !cancelled() && (needs.changes.result != 'success' || needs.changes.outputs.docs_only != 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: realtime-worker
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: realtime-worker/.node-version
          cache: npm
          cache-dependency-path: realtime-worker/package-lock.json

      - name: Verify pinned Node.js
        run: test "$(node --version)" = "v24.18.0"

      - name: Install Worker dependencies
        run: npm ci

      - name: Worker typecheck
        run: npm run typecheck

      - name: Worker tests
        run: npm test

      - name: Wrangler dry-run build
        run: npm run build

  rust-quality:
    name: Rust quality gates
    needs: changes
    if: ${{ always() && !cancelled() && (needs.changes.result != 'success' || needs.changes.outputs.docs_only != 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy

      - name: Cache Cargo dependencies and targets
        id: rust-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-rust-1.97.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-rust-1.97.0-

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Client architecture boundary
        run: |
          sh app/tool/check_client_boundaries.sh
          sh app/tool/test_client_boundaries.sh

      - name: SQLx offline metadata
        run: env -u DATABASE_URL cargo check -p taskveil-server --all-targets

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust test
        run: cargo test --workspace

      - name: Save Cargo dependencies and targets
        if: success() && github.event_name != 'pull_request' && steps.rust-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ steps.rust-cache.outputs.cache-primary-key }}

  sqlx-metadata:
    name: SQLx metadata freshness
    needs: changes
    if: ${{ always() && !cancelled() && (needs.changes.result != 'success' || needs.changes.outputs.docs_only != 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0

      - name: Cache SQLx tooling and Cargo dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/bin/cargo-sqlx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-sqlx-cli-0.9.0-rust-1.97.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-sqlx-cli-0.9.0-rust-1.97.0-

      - name: Install SQLx CLI
        run: |
          if ! cargo sqlx --version 2>/dev/null | grep -q '0.9.0'; then
            cargo install sqlx-cli --version 0.9.0 --locked --no-default-features --features postgres,rustls --force
          fi
          cargo sqlx --version

      - name: Verify SQLx metadata against fresh migrations
        run: ./tool/sqlx_prepare.sh --check

  flutter-quality:
    name: Flutter quality gates
    needs: changes
    if: ${{ always() && !cancelled() && (needs.changes.result != 'success' || needs.changes.outputs.docs_only != 'true') }}
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          components: rustfmt
          targets: aarch64-apple-ios

      - name: Cache Cargo dependencies and targets
        id: flutter-rust-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            app/rust/target
            app/target
          key: ${{ runner.os }}-${{ runner.arch }}-flutter-rust-ios-v1-1.97.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-flutter-rust-ios-v1-1.97.0-
            ${{ runner.os }}-${{ runner.arch }}-flutter-rust-1.97.0-

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
          cache-key: ${{ runner.os }}-${{ runner.arch }}-flutter-3.44.6
          pub-cache: true
          pub-cache-key: ${{ runner.os }}-${{ runner.arch }}-pub-${{ hashFiles('app/pubspec.lock') }}

      - name: Cache FRB tooling
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/bin/flutter_rust_bridge_codegen
            ~/.cargo/bin/cargo-expand
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-${{ runner.arch }}-frb-codegen-2.12.0-cargo-expand-1.0.123

      - name: Install FRB tooling
        run: |
          if ! command -v flutter_rust_bridge_codegen >/dev/null; then
            cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked
          elif ! flutter_rust_bridge_codegen --version | grep -q '2.12.0'; then
            cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked --force
          fi
          flutter_rust_bridge_codegen --version
          if ! command -v cargo-expand >/dev/null; then
            cargo install cargo-expand --version 1.0.123 --locked
          elif ! cargo expand --version | grep -q '1.0.123'; then
            cargo install cargo-expand --version 1.0.123 --locked --force
          fi
          cargo expand --version

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Cargokit build_tool pub get
        working-directory: app/rust_builder/cargokit/build_tool
        run: dart pub get

      - name: FRB regenerate
        run: flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml

      - name: FRB generated diff check
        run: git diff --ignore-space-at-eol --exit-code -- app/rust/src/frb_generated.rs app/rust/frb_generated.h app/lib/src/rust

      - name: Build app/rust release library for Flutter tests
        working-directory: app/rust
        run: env CARGO_TARGET_DIR=target cargo build --release

      - name: Flutter analyze
        working-directory: app
        run: flutter analyze

      - name: Flutter test
        working-directory: app
        run: flutter test

      - name: UI hardcoded string check
        run: sh app/tool/check_hardcoded_strings.sh

      - name: Build iOS arm64 release app without codesigning
        working-directory: app
        run: env CARGOKIT_TARGET_TEMP_DIR="$PWD/target" flutter build ios --release --no-codesign

      - name: Verify iOS arm64 Rust framework
        run: |
          test -s app/build/ios/iphoneos/Runner.app/Runner
          bridge=app/build/ios/iphoneos/Runner.app/Frameworks/taskveil_app_bridge.framework/taskveil_app_bridge
          test -s "$bridge"
          lipo "$bridge" -verify_arch arm64

      - name: Save Cargo dependencies and targets
        if: success() && github.event_name != 'pull_request' && steps.flutter-rust-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            app/rust/target
            app/target
          key: ${{ steps.flutter-rust-cache.outputs.cache-primary-key }}

  android-build:
    name: Android arm64 release APK
    needs: changes
    if: ${{ always() && !cancelled() && (needs.changes.result != 'success' || needs.changes.outputs.docs_only != 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          targets: aarch64-linux-android

      - name: Restore Android build cache
        id: android-build-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/target
          key: ${{ runner.os }}-${{ runner.arch }}-android-arm64-rust-1.97.0-ndk-28.2.13676358-${{ hashFiles('Cargo.lock', 'app/pubspec.lock', 'app/android/**/*.gradle*', 'app/android/gradle/wrapper/gradle-wrapper.properties', 'app/rust_builder/cargokit/build_tool/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-android-arm64-rust-1.97.0-ndk-28.2.13676358-

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
          cache-key: ${{ runner.os }}-${{ runner.arch }}-flutter-3.44.6
          pub-cache: true
          pub-cache-key: ${{ runner.os }}-${{ runner.arch }}-pub-${{ hashFiles('app/pubspec.lock') }}

      - name: Install Android SDK and NDK
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "ndk;28.2.13676358"

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Cargokit build_tool pub get
        working-directory: app/rust_builder/cargokit/build_tool
        run: dart pub get

      - name: Build Android arm64 release APK
        working-directory: app
        run: flutter build apk --release --target-platform android-arm64

      - name: Verify Android arm64 JNI library
        run: |
          test -s app/build/app/outputs/flutter-apk/app-release.apk
          unzip -p app/build/app/outputs/flutter-apk/app-release.apk lib/arm64-v8a/libtaskveil_app_bridge.so > /dev/null

      - name: Save Android build cache
        if: success() && github.event_name != 'pull_request' && steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/target
          key: ${{ steps.android-build-cache.outputs.cache-primary-key }}

  android-emulator:
    name: Android Emulator tests
    needs: [changes, android-build]
    if: ${{ !cancelled() && needs.android-build.result == 'success' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          targets: i686-linux-android,x86_64-linux-android

      - name: Restore Android Emulator cache
        id: android-emulator-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/target
          key: ${{ runner.os }}-${{ runner.arch }}-android-emulator-rust-1.97.0-ndk-28.2.13676358-${{ hashFiles('Cargo.lock', 'app/pubspec.lock', 'app/android/**/*.gradle*', 'app/android/gradle/wrapper/gradle-wrapper.properties', 'app/rust_builder/cargokit/build_tool/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-android-emulator-rust-1.97.0-ndk-28.2.13676358-

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
          cache-key: ${{ runner.os }}-${{ runner.arch }}-flutter-3.44.6
          pub-cache: true
          pub-cache-key: ${{ runner.os }}-${{ runner.arch }}-pub-${{ hashFiles('app/pubspec.lock') }}

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Cargokit build_tool pub get
        working-directory: app/rust_builder/cargokit/build_tool
        run: dart pub get

      - name: Run Android Emulator tests
        uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          cores: 2
          ram-size: 2048M
          ndk: 28.2.13676358
          disable-animations: true
          script: sh tool/ci/run_android_emulator_tests.sh

      - name: Save Android Emulator cache
        if: success() && steps.android-emulator-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/target
          key: ${{ steps.android-emulator-cache.outputs.cache-primary-key }}

  security-quality:
    name: Dependency and secret gates
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0

      - name: Cache security tooling
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-audit-0.22.2

      - name: Install cargo-audit
        run: |
          if ! cargo audit --version 2>/dev/null | grep -q '0.22.2'; then
            cargo install cargo-audit --version 0.22.2 --locked --force
          fi
          cargo audit --version

      - name: Verify fixed crypto dependencies
        run: sh tool/check_crypto_dependency_pins.sh

      - name: Scan tracked files for secret patterns
        run: sh tool/check_secret_patterns.sh

      - name: RustSec audit
        run: cargo audit --deny warnings

  crypto-fuzz:
    name: Crypto parser fuzz smoke
    needs: changes
    if: ${{ always() && !cancelled() && (needs.changes.result != 'success' || needs.changes.outputs.docs_only != 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pinned nightly Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: nightly-2026-07-14

      - name: Cache fuzz tooling and targets
        id: fuzz-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-fuzz
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            fuzz/target
          key: ${{ runner.os }}-${{ runner.arch }}-nightly-2026-07-14-cargo-fuzz-0.13.2-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.lock', 'fuzz/Cargo.toml') }}

      - name: Install cargo-fuzz
        run: |
          if ! cargo fuzz --version 2>/dev/null | grep -q 'cargo-fuzz 0.13.2'; then
            cargo install cargo-fuzz --version 0.13.2 --locked --force
          fi
          cargo fuzz --version

      - name: Fuzz envelope and key parsers
        run: cargo +nightly-2026-07-14 fuzz run crypto_parsers -- -max_total_time=60 -timeout=10 -max_len=16384 -dict=fuzz/crypto_parsers.dict

      - name: Save fuzz tooling and targets
        if: success() && github.event_name != 'pull_request' && steps.fuzz-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-fuzz
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            fuzz/target
          key: ${{ steps.fuzz-cache.outputs.cache-primary-key }}
